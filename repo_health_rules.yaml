scoring_system:
  activity_score:
    description: "Score based on recency of updates"
    calculation:
      0-30_days: 100
      31-60_days: 80
      61-90_days: 60
      91-180_days: 40
      181-365_days: 20
      over_365_days: 0
  
  engagement_score:
    description: "Score based on community engagement"
    stars_weight: 0.6
    forks_weight: 0.4
    thresholds:
      excellent: 1000  # stars
      good: 100
      moderate: 50
      low: 10
      minimal: 0
  
  maintenance_score:
    description: "Overall maintenance quality"
    factors:
      - "Update frequency"
      - "Community responsiveness"
      - "Code quality indicators"
  
  overall_health:
    description: "Weighted average of all scores"
    weights:
      activity: 0.4
      engagement: 0.3
      maintenance: 0.3

health_states:
  HEALTHY:
    overall_score_range: [80, 100]
    description: "Repository is actively maintained and healthy"
  
  WARNING:
    overall_score_range: [60, 79]
    description: "Repository shows signs of reduced activity"
  
  STALE:
    overall_score_range: [40, 59]
    description: "Repository has not been updated recently"
  
  CRITICAL:
    overall_score_range: [0, 39]
    description: "Repository appears abandoned or in critical state"
    
repo_health:
  windows:
    active_days: 14
    recent_days: 45
    stale_days: 120

  states:
    - name: ACTIVE
      condition: "days_since_update <= active_days"
      meaning: "Repository is actively maintained."

    - name: RECENT
      condition: "days_since_update > active_days and days_since_update <= recent_days"
      meaning: "Repository was updated recently and shows normal activity."

    - name: STALE
      condition: "days_since_update > recent_days and days_since_update <= stale_days"
      meaning: "Repository shows reduced activity and may need attention."

    - name: DORMANT
      condition: "days_since_update > stale_days"
      meaning: "Repository has been inactive for a long period."

  overrides:
    new_repo_days: 14
